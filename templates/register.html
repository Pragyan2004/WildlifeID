{% extends "base.html" %}

{% block title %}WildlifeID | Create Account{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-75 py-5">
    <div class="col-md-5">
        <div class="card border shadow-sm p-5 bg-white">
            <div class="text-center mb-5">
                <i class="fas fa-user-plus text-accent display-4 mb-3"></i>
                <h1 class="fw-bold text-dark fs-2">Join WildlifeID</h1>
                <p class="text-muted">Start tracking and identifying wildlife tracks today.</p>
            </div>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label small text-muted text-uppercase fw-bold">Full Name</label>
                    <input type="text" name="name" class="form-control bg-light border-0 py-3"
                        placeholder="Aarav Sharma" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small text-muted text-uppercase fw-bold">Email Address</label>
                    <input type="email" name="email" class="form-control bg-light border-0 py-3"
                        placeholder="aarav@wildlifeid.org" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small text-muted text-uppercase fw-bold">Password</label>
                    <input type="password" name="password" class="form-control bg-light border-0 py-3"
                        placeholder="Choose a strong password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3 fw-bold mb-4">Create Account</button>
            </form>

            <div class="text-center">
                <p class="text-muted small mb-0">Already have an account? <a href="/login"
                        class="text-accent fw-bold text-decoration-none">Sign In</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
